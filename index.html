<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>生日贺卡</title>
<style>
*{
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: "Microsoft Yahei", sans-serif;
}
body {
    min-height: 100vh;
    background: linear-gradient(135deg, #ffecd2, #fcb69f);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    position: relative;
    overflow: hidden;
}
.card {
    width: 100%;
    max-width: 420px;
    background: #fff;
    border-radius: 20px;
    padding: 40px 30px;
    text-align: center;
    box-shadow: 0 8px 30px rgba(0,0,0,0.12);
    position: relative;
    overflow: hidden;
    display: none;
}
.card.active {
    display: block;
}
.card::before {
    content: "";
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 6px;
    background: linear-gradient(90deg, #ff6b6b, #ffd93d);
}
h1 {
    font-size: 28px;
    color: #222;
    margin-bottom: 20px;
}
.wish-text {
    font-size: 18px;
    color: #444;
    line-height: 1.9;
    margin: 25px 0;
    white-space: pre-line;
}
.highlight {
    color: #ff5757;
    font-weight: bold;
    font-size: 20px;
}
.cursor {
    animation: blink 0.7s infinite;
}
@keyframes blink {
    0%,100%{opacity:1;}
    50%{opacity:0;}
}
.decorate {
    display: none;
}
.sign {
    margin-top: 35px;
    font-size: 15px;
    color: #777;
}
/* 翻页按钮 */
.prev-btn, .next-btn {
    position: fixed;
    bottom: 30px;
    padding: 12px 24px;
    border: none;
    border-radius: 30px;
    background-color: #ff6b6b;
    color: white;
    font-size: 16px;
    cursor: pointer;
    box-shadow: 0 4px 12px rgba(255, 107, 107, 0.3);
}
.prev-btn {
    left: 30px;
}
.next-btn {
    right: 30px;
}
.prev-btn:hover, .next-btn:hover {
    background-color: #ff4f4f;
}
.prev-btn:disabled, .next-btn:disabled {
    background: #ccc;
    cursor: not-allowed;
    box-shadow: none;
}
</style>
</head>
<body>
<!-- 封面 点击卡片任意位置进入第1页 -->
<div class="card active" data-page="cover" id="coverBox">
    <h1>汪禹孝亲启</h1>
    <div class="wish-text"></div>
    <div class="sign">点击卡片翻开贺卡</div>
</div>

<!-- 正文一共5面：1~5页 -->
<div class="card" data-page="1">
    <h1>生日快乐</h1>
    <div class="wish-text" data-text="胸肌哥哥生日快乐
祝你的胸肌越练越大，大到可以夹死我"></div>
    <div class="sign">——王冠凯</div>
</div>
<div class="card" data-page="2">
    <h1>生日快乐</h1>
    <div class="wish-text" data-text="笑笑肌肉大 笑笑肌肉大
胸阔背厚肌肉大 肩宽腿强体脂低 头顶不尖尖 
汪禹孝生日快乐 肌肉越来越大💪"></div>
    <div class="sign">——盛强</div>
</div>
<div class="card" data-page="3">
    <h1>生日快乐</h1>
    <div class="wish-text" data-text="汪禹孝生日快乐
祝早日成为双开门冰箱，胸肌可以一把给我头夹爆"></div>
    <div class="sign">——王千懿</div>
</div>
<div class="card" data-page="4">
    <h1>生日快乐</h1>
    <div class="wish-text" data-text="祝WYX鸡巴越来越粗大"></div>
    <div class="sign">——羊文彪</div>
</div>
<div class="card" data-page="5">
    <h1>生日快乐</h1>
    <div class="wish-text" data-text="生日快乐，祝你早点找到学姐🫰"></div>
    <div class="sign">——滕远帆</div>
</div>

<button class="prev-btn" id="prevBtn" disabled>上一页</button>
<button class="next-btn" id="nextBtn" disabled>下一页</button>

<script>
const allCards = document.querySelectorAll('.card');
const prevBtn = document.getElementById('prevBtn');
const nextBtn = document.getElementById('nextBtn');
const coverBox = document.getElementById('coverBox');

let currentPage = 'cover';
const maxContentPage = 5;
let audioCtx = null;
let hasPlayMusic = false;
let typingTimer = null;
const typeSpeed = 120;

// 内置生日快乐简谱
const melody = [
    {note:261.63, dur:0.3},{note:261.63, dur:0.3},{note:293.66, dur:0.6},{note:261.63, dur:0.6},{note:349.23, dur:0.6},{note:329.63, dur:1},
    {note:261.63, dur:0.3},{note:261.63, dur:0.3},{note:293.66, dur:0.6},{note:261.63, dur:0.6},{note:392, dur:0.6},{note:349.23, dur:1},
    {note:261.63, dur:0.3},{note:261.63, dur:0.3},{note:523.25, dur:0.6},{note:440, dur:0.6},{note:349.23, dur:0.4},{note:329.63, dur:0.4},{note:293.66, dur:1},
    {note:466.16, dur:0.3},{note:466.16, dur:0.3},{note:440, dur:0.6},{note:349.23, dur:0.6},{note:392, dur:0.6},{note:349.23, dur:1.2}
];

function playMelody(){
    if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    let time = audioCtx.currentTime;
    let totalDuration = 0;
    melody.forEach(item=>{
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.type = "sine";
        osc.frequency.value = item.note;
        gain.gain.setValueAtTime(0.25, time);
        gain.gain.exponentialRampToValueAtTime(0.001, time + item.dur - 0.02);
        osc.start(time);
        osc.stop(time + item.dur);
        time += item.dur;
        totalDuration += item.dur;
    })
    // 播放完停顿2秒自动重新播放
    setTimeout(playMelody, totalDuration * 1000 + 2000);
}


// 打字动画
function startTypeAnimation(wrapDom, fullText){
    clearTimeout(typingTimer);
    let index = 0;
    wrapDom.innerHTML = "";
    function typing(){
        if(index < fullText.length){
            wrapDom.textContent = fullText.slice(0, index+1);
            wrapDom.innerHTML += `<span class="cursor">|</span>`;
            index++;
            typingTimer = setTimeout(typing, typeSpeed);
        }else{
            wrapDom.innerHTML = fullText + `<span class="cursor">|</span>`;
        }
    }
    typing();
}

function render(){
    clearTimeout(typingTimer);
    allCards.forEach(c => c.classList.remove('active'));
    const activeCard = document.querySelector(`[data-page="${currentPage}"]`);
    activeCard.classList.add('active');

    if(currentPage === 'cover'){
        prevBtn.disabled = true;
        nextBtn.disabled = true;
    }else{
        const num = Number(currentPage);
        prevBtn.disabled = num === 1;
        nextBtn.disabled = num === maxContentPage;
        // 获取当前页文字容器，启动打字动画
        const textWrap = activeCard.querySelector('.wish-text');
        const textContent = textWrap.dataset.text;
        startTypeAnimation(textWrap, textContent);
    }
}

// 点击封面进入第1页，自动播放音乐
coverBox.addEventListener('click',()=>{
    currentPage = 1;
    render();
    if(!hasPlayMusic){
        hasPlayMusic = true;
        playMelody();
    }
})

nextBtn.onclick = ()=>{
    const num = Number(currentPage);
    if(num < maxContentPage){
        currentPage = num + 1;
        render();
    }
}
prevBtn.onclick = ()=>{
    const num = Number(currentPage);
    if(num > 1){
        currentPage = num - 1;
        render();
    }
}

render();
</script>
</body>
</html>
